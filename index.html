<!doctype html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beckmans Hero Slideshow</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Geist+Mono:wght@500&display=swap");

    @font-face {
      font-family: "FuturaEFOP-DemiBold";
      src: url("./assets/fonts/FuturaEFOP-DemiBold.otf") format("opentype");
      font-style: normal;
      font-weight: 600;
      font-display: swap;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #fff;
      color: #231f20;
      font-family: "FuturaEFOP-DemiBold", "Avenir Next", "Avenir", "Helvetica Neue", Arial, sans-serif;
      min-height: 100dvh;
    }

    .page {
      width: 100vw;
      height: 100dvh;
      margin: 0;
      position: relative;
      overflow: hidden;
      background: #fff;
    }

    .browser-chrome {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 46px;
      background: #090909;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px;
      z-index: 5;
    }

    .chrome-left {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .chrome-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      display: block;
    }

    .chrome-dot.red { background: #ff5f57; }
    .chrome-dot.yellow { background: #febc2e; }
    .chrome-dot.green { background: #28c840; }

    .chrome-center {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .chrome-nav {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #cfcfcf;
      opacity: 0.9;
    }

    .chrome-url {
      height: 24px;
      width: min(52vw, 470px);
      border-radius: 999px;
      background: #111;
      border: 1px solid #1f1f1f;
      color: #fff;
      font-size: 11px;
      letter-spacing: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      opacity: 0.9;
    }

    .chrome-right {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #e9e9e9;
      font-size: 0;
      opacity: 0.9;
    }

    .chrome-icon {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .nav {
      position: absolute;
      top: 62px;
      left: 16px;
      right: 16px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      font-size: 16px;
      letter-spacing: -0.32px;
      text-transform: lowercase;
      line-height: normal;
      user-select: none;
      z-index: 3;
    }

    .nav > span {
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .brand {
      text-transform: none;
      line-height: 0.96;
      letter-spacing: 0;
    }

    .search {
      width: 16px;
      height: 16px;
      flex: 0 0 16px;
    }

    .hero {
      position: absolute;
      left: 0;
      right: 0;
      top: 206px;
      bottom: 0;
      display: flex;
      align-items: stretch;
      z-index: 1;
    }

    .hero-col {
      position: relative;
      flex: 1 1 33.333%;
      min-width: 0;
    }

    .card {
      position: absolute;
      inset: 0;
      overflow: hidden;
      background: #dbdbdb;
    }

    .image-layer,
    .slot {
      position: absolute;
      inset: 0;
    }

    .slot {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      opacity: 0;
      transition: none;
      will-change: opacity;
    }

    .slot.is-visible {
      opacity: 1;
    }

    .image-layer.front {
      left: 28px;
      right: 28px;
      top: 28px;
      bottom: 77px;
      overflow: hidden;
      z-index: 2;
    }

    .image-layer.back::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      pointer-events: none;
      z-index: 1;
    }

    .image-layer.back {
      z-index: 0;
    }

    .image-layer.front::after {
      content: none !important;
    }

    #col-vk .image-layer.front {
      top: 26px;
      bottom: 77px;
    }

    .overlay {
      position: absolute;
      left: 28px;
      top: 28px;
      display: flex;
      flex-direction: column;
      gap: 0;
      align-items: flex-start;
      font-family: "Geist Mono", "SFMono-Regular", Menlo, Monaco, Consolas, monospace;
      text-transform: uppercase !important;
      letter-spacing: 1.04px;
      font-size: 13px;
      color: #fff;
      z-index: 2;
    }

    #col-vk .overlay {
      top: 26px;
    }

    .label-row {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      width: max-content;
    }

    .cap-left {
      width: 16px;
      height: 24px;
      background: #000;
      flex: 0 0 16px;
    }

    .cap-middle {
      height: 24px;
      display: inline-flex;
      align-items: center;
      background: #000;
      padding: 0 8px 0 0;
      white-space: nowrap;
      line-height: normal;
      font-weight: 500;
      font-feature-settings: "ss09" 1, "ss08" 1;
    }

    .subtitle-text { display: inline-flex; align-items: center; }

    .cap-right {
      width: 15px;
      height: 24px;
      flex: 0 0 15px;
      background: #000;
      border-top-right-radius: 999px;
      border-bottom-right-radius: 999px;
    }

    .label-sep {
      width: 16px;
      height: 1px;
      background: #000;
      display: block;
    }

    .pager-middle {
      padding-right: 8px;
    }

    .mini-pagination {
      height: 8px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .mini-dot {
      width: 4px;
      height: 4px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.3);
      flex: 0 0 4px;
    }

    .mini-bar {
      position: relative;
      width: 24px;
      height: 4px;
      flex: 0 0 24px;
    }

    .mini-bar-bg,
    .mini-bar-fill {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      border-radius: 999px;
    }

    .mini-bar-bg {
      background: rgba(255, 255, 255, 0.3);
    }

    .mini-bar-fill {
      background: #fff;
      transform-origin: left center;
      transform: scaleX(0);
    }

    .card-footer {
      position: absolute;
      left: 28px;
      right: 29px;
      bottom: 27px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #fff;
      z-index: 3;
      pointer-events: none;
      height: 24px;
    }

    .card-footer .footer-title {
      font-size: 38px;
      line-height: 0.92;
      letter-spacing: -0.03em;
      text-transform: lowercase;
      display: inline-flex;
      align-items: baseline;
      gap: 4px;
    }

    .card-footer .footer-title sup {
      font-size: 20px;
      letter-spacing: -0.01em;
      display: inline-block;
      position: relative;
      top: -0.42em;
      line-height: 1;
    }

    .card-footer .footer-plus {
      width: 24px;
      height: 24px;
      stroke: #fff;
      fill: none;
      stroke-width: 1.4;
      stroke-linecap: round;
    }

    @media (max-width: 1100px) {
      .nav {
        font-size: 14px;
      }
      .hero {
        top: 190px;
      }
      .overlay {
        zoom: 0.92;
      }
      .card-footer .footer-title {
        font-size: 28px;
      }
      .card-footer .footer-title sup {
        font-size: 14px;
        top: -0.35em;
      }
      .card-footer .footer-plus {
        font-size: 38px;
      }
    }

    @media (max-width: 920px) {
      .nav span:nth-child(5),
      .nav span:nth-child(6) {
        display: none;
      }
      .hero {
        position: relative;
        top: 88px;
        display: grid;
        grid-template-columns: 1fr;
      }
      .hero-col {
        min-height: 62vh;
      }
      .page {
        height: auto;
        min-height: 100dvh;
      }
    }
  </style>

    function truncateProject(value) {
      const v = (value || "").trim();
      return v.length <= PROJECT_MAX_CHARS ? v : v.slice(0, PROJECT_MAX_CHARS);
    }

    function randomDuration() {
      return SLIDE_MS_MIN + Math.random() * (SLIDE_MS_MAX - SLIDE_MS_MIN);
    }

    class CardSlideshow {
      constructor(root, data, options = {}) {
        this.root = root;
        this.data = data;
        this.studentIndex = options.startStudent ?? 0;
        this.step = options.startStep ?? 0;
        this.visibleSlot = "a";
        this.currentSlideDuration = randomDuration();
        const startProgress = options.startProgress ?? Math.random();
        this.cycleStart = performance.now() - startProgress * this.currentSlideDuration;

        this.backA = root.querySelector(".image-layer.back .slot-a");
        this.backB = root.querySelector(".image-layer.back .slot-b");
        this.frontA = root.querySelector(".image-layer.front .slot-a");
        this.frontB = root.querySelector(".image-layer.front .slot-b");
        this.studentEl = root.querySelector(".student");
        this.subtitleEl = root.querySelector(".subtitle");
        this.paginationEl = root.querySelector(".mini-pagination");
        this.fillEl = null;

        this.renderPagination();
        this.applyInitial();
        this.setProgress(startProgress);
      }

      renderPagination() {
        this.paginationEl.innerHTML = "";
        for (let i = 0; i < PAGINATION_COUNT; i += 1) {
          if (i === this.step) {
            const bar = document.createElement("span");
            bar.className = "mini-bar";
            const bg = document.createElement("span");
            bg.className = "mini-bar-bg";
            const fill = document.createElement("span");
            fill.className = "mini-bar-fill";
            bar.append(bg, fill);
            this.paginationEl.appendChild(bar);
            this.fillEl = fill;
          } else {
            const dot = document.createElement("span");
            dot.className = "mini-dot";
            this.paginationEl.appendChild(dot);
          }
        }
      }

      setProgress(progress) {
        if (!this.fillEl) return;
        const clamped = Math.max(0, Math.min(progress, 1));
        this.fillEl.style.transform = `scaleX(${clamped})`;
      }

      applyInitial() {
        const item = this.data.students[this.studentIndex];
        this.backA.src = item.backImage;
        this.frontA.src = item.frontImage;
        this.studentEl.textContent = item.name.toUpperCase();
        this.subtitleEl.textContent = truncateProject(item.project).toUpperCase();
      }

      nextSlide() {
        this.studentIndex = (this.studentIndex + 1) % this.data.students.length;
        const next = this.data.students[this.studentIndex];
        const showA = this.visibleSlot !== "a";
        const nextBack = showA ? this.backA : this.backB;
        const prevBack = showA ? this.backB : this.backA;
        const nextFront = showA ? this.frontA : this.frontB;
        const prevFront = showA ? this.frontB : this.frontA;

        nextBack.src = next.backImage;
        nextFront.src = next.frontImage;
        nextBack.classList.add("is-visible");
        prevBack.classList.remove("is-visible");

        window.setTimeout(() => {
          nextFront.classList.add("is-visible");
          prevFront.classList.remove("is-visible");
          this.studentEl.textContent = next.name.toUpperCase();
          this.subtitleEl.textContent = truncateProject(next.project).toUpperCase();
        }, FRONT_DELAY_MS);

        this.visibleSlot = showA ? "a" : "b";
        this.step = (this.step + 1) % PAGINATION_COUNT;
        this.renderPagination();
        this.cycleStart = performance.now();
        this.currentSlideDuration = randomDuration();
        this.setProgress(0);
      }

      frame(now) {
        const progress = (now - this.cycleStart) / this.currentSlideDuration;
        this.setProgress(progress);
        if (progress >= 1) {
          this.nextSlide();
        }
      }
    }

    const cards = [
      new CardSlideshow(document.querySelector("#col-form"), cardData.form),
      new CardSlideshow(document.querySelector("#col-mode"), cardData.mode),
      new CardSlideshow(document.querySelector("#col-vk"), cardData.vk)
    ];

    function animate(now) {
      cards.forEach((card) => card.frame(now));
      requestAnimationFrame(animate);
    }

    requestAnimationFrame(animate);
  </script>
</body>
</html>
