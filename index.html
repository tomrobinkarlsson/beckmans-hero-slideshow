<!doctype html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beckmans Hero Slideshow</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Geist+Mono:wght@500&display=swap");

    @font-face {
      font-family: "FuturaEFOP-DemiBold";
      src: url("./assets/fonts/FuturaEFOP-DemiBold.otf") format("opentype");
      font-style: normal;
      font-weight: 600;
      font-display: swap;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #fff;
      color: #231f20;
      font-family: "FuturaEFOP-DemiBold", "Avenir Next", "Avenir", "Helvetica Neue", Arial, sans-serif;
      min-height: 100dvh;
    }

    .page {
      width: 100vw;
      height: 100dvh;
      margin: 0;
      position: relative;
      overflow: hidden;
      background: #fff;
    }

    .nav {
      position: absolute;
      top: 16px;
      left: 16px;
      right: 16px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      font-size: 16px;
      letter-spacing: -0.32px;
      text-transform: lowercase;
      line-height: normal;
      user-select: none;
      z-index: 3;
    }

    .nav > span {
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .brand {
      text-transform: none;
      line-height: 0.96;
      letter-spacing: 0;
    }

    .search {
      width: 16px;
      height: 16px;
      flex: 0 0 16px;
    }

    .hero {
      position: absolute;
      left: 0;
      right: 0;
      top: 114px;
      bottom: 0;
      display: flex;
      align-items: stretch;
      z-index: 1;
    }

    .hero-col {
      position: relative;
      flex: 1 1 33.333%;
      min-width: 0;
    }

    .card {
      position: absolute;
      inset: 0;
      overflow: hidden;
      background: #dbdbdb;
    }

    .image-layer,
    .slot {
      position: absolute;
      inset: 0;
    }

    .slot {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      opacity: 0;
      transition: none;
      will-change: opacity;
    }

    .slot.is-visible {
      opacity: 1;
    }

    .image-layer.front {
      inset: 4.375% 5.625%;
      overflow: hidden;
    }

    .overlay {
      position: absolute;
      left: 0;
      bottom: 16px;
      display: flex;
      flex-direction: column;
      gap: 0;
      align-items: flex-start;
      font-family: "Geist Mono", "SFMono-Regular", Menlo, Monaco, Consolas, monospace;
      text-transform: uppercase !important;
      letter-spacing: 1.04px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      font-size: 13px;
      color: #fff;
      z-index: 2;
    }

    .label-row {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      width: max-content;
    }

    .cap-left {
      width: 16px;
      height: 24px;
      background: #000;
      flex: 0 0 16px;
    }

    .cap-middle {
      height: 24px;
      display: inline-flex;
      align-items: center;
      background: #000;
      padding: 0 8px 0 0;
      white-space: nowrap;
      line-height: normal;
      font-weight: 500;
      font-feature-settings: "ss09" 1, "ss08" 1;
    }

    .program-text {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .program-text::after {
      content: "➔";
      font-size: 12px;
      letter-spacing: 0;
      transform: translateY(-1px);
    }

    .cap-right {
      width: 15px;
      height: 24px;
      flex: 0 0 15px;
      background: #000;
      border-top-right-radius: 999px;
      border-bottom-right-radius: 999px;
    }

    .label-sep {
      width: 16px;
      height: 1px;
      background: #000;
      display: block;
    }

    .pager-middle {
      padding-right: 8px;
    }

    .mini-pagination {
      height: 8px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .mini-dot {
      width: 4px;
      height: 4px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.3);
      flex: 0 0 4px;
    }

    .mini-bar {
      position: relative;
      width: 24px;
      height: 4px;
      flex: 0 0 24px;
    }

    .mini-bar-bg,
    .mini-bar-fill {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      border-radius: 999px;
    }

    .mini-bar-bg {
      background: rgba(255, 255, 255, 0.3);
    }

    .mini-bar-fill {
      background: #fff;
      transform-origin: left center;
      transform: scaleX(0);
    }

    @media (max-width: 1100px) {
      .nav {
        font-size: 14px;
      }
      .hero {
        top: 96px;
      }
      .overlay {
        zoom: 0.92;
      }
    }

    @media (max-width: 920px) {
      .nav span:nth-child(5),
      .nav span:nth-child(6) {
        display: none;
      }
      .hero {
        position: relative;
        top: 88px;
        display: grid;
        grid-template-columns: 1fr;
      }
      .hero-col {
        min-height: 62vh;
      }
      .page {
        height: auto;
        min-height: 100dvh;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="nav">
      <span class="brand">beckmans designhögskola</span>
      <span>form</span>
      <span>mode</span>
      <span>visuell kommunikation</span>
      <span>kvällskolan</span>
      <span>ansök</span>
      <svg class="search" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <circle cx="6.8" cy="6.8" r="4.7" stroke="#231F20" stroke-width="1.2" />
        <path d="M10.25 10.25L13.9 13.9" stroke="#231F20" stroke-width="1.2" stroke-linecap="round" />
      </svg>
    </header>

    <section class="hero">
      <article class="hero-col" id="col-form">
        <div class="card">
          <div class="image-layer back">
            <img class="slot slot-a is-visible" alt="" />
            <img class="slot slot-b" alt="" />
          </div>
          <div class="image-layer front">
            <img class="slot slot-a is-visible" alt="" />
            <img class="slot slot-b" alt="" />
          </div>
          <div class="overlay">
            <div class="label-row">
              <span class="cap-left"></span>
              <span class="cap-middle student"></span>
              <span class="cap-right"></span>
            </div>
            <span class="label-sep"></span>
            <div class="label-row">
              <span class="cap-left"></span>
              <span class="cap-middle program-text program"></span>
              <span class="cap-right"></span>
            </div>
            <span class="label-sep"></span>
            <div class="label-row">
              <span class="cap-left"></span>
              <span class="cap-middle pager-middle"><span class="mini-pagination"></span></span>
              <span class="cap-right"></span>
            </div>
          </div>
        </div>
      </article>

      <article class="hero-col" id="col-mode">
        <div class="card">
          <div class="image-layer back">
            <img class="slot slot-a is-visible" alt="" />
            <img class="slot slot-b" alt="" />
          </div>
          <div class="image-layer front">
            <img class="slot slot-a is-visible" alt="" />
            <img class="slot slot-b" alt="" />
          </div>
          <div class="overlay">
            <div class="label-row">
              <span class="cap-left"></span>
              <span class="cap-middle student"></span>
              <span class="cap-right"></span>
            </div>
            <span class="label-sep"></span>
            <div class="label-row">
              <span class="cap-left"></span>
              <span class="cap-middle program-text program"></span>
              <span class="cap-right"></span>
            </div>
            <span class="label-sep"></span>
            <div class="label-row">
              <span class="cap-left"></span>
              <span class="cap-middle pager-middle"><span class="mini-pagination"></span></span>
              <span class="cap-right"></span>
            </div>
          </div>
        </div>
      </article>

      <article class="hero-col" id="col-vk">
        <div class="card">
          <div class="image-layer back">
            <img class="slot slot-a is-visible" alt="" />
            <img class="slot slot-b" alt="" />
          </div>
          <div class="image-layer front">
            <img class="slot slot-a is-visible" alt="" />
            <img class="slot slot-b" alt="" />
          </div>
          <div class="overlay">
            <div class="label-row">
              <span class="cap-left"></span>
              <span class="cap-middle student"></span>
              <span class="cap-right"></span>
            </div>
            <span class="label-sep"></span>
            <div class="label-row">
              <span class="cap-left"></span>
              <span class="cap-middle program-text program"></span>
              <span class="cap-right"></span>
            </div>
            <span class="label-sep"></span>
            <div class="label-row">
              <span class="cap-left"></span>
              <span class="cap-middle pager-middle"><span class="mini-pagination"></span></span>
              <span class="cap-right"></span>
            </div>
          </div>
        </div>
      </article>
    </section>
  </main>

  <script>
    const SLIDE_MS_MIN = 3200;
    const SLIDE_MS_MAX = 4400;
    const FRONT_DELAY_MS = 220;
    const PAGINATION_COUNT = 5;

    const cardData = {
      form: {
        program: "FORM 180HP",
        students: [
          {
            name: "Mikael Westman",
            backImage: "https://beckmans.se/wp-content/uploads/2025/10/501A9043-2-Edit-1-1200x1500.jpg",
            frontImage: "https://beckmans.se/wp-content/uploads/2025/02/stool-mikael.westman-02-1500x844.jpg"
          },
          {
            name: "Erik Marklund",
            backImage: "https://beckmans.se/wp-content/uploads/2025/06/Erik-Marklund-Beckmans-Designhogskola-4-1500x1200.jpg",
            frontImage: "https://beckmans.se/wp-content/uploads/2025/02/Pula_Erik_Marklund_Beckmans_2-1200x1500.jpg"
          },
          {
            name: "Julia Bianco Sommer",
            backImage: "https://beckmans.se/wp-content/uploads/2025/04/HINTER_0325_02_copy-1000x1500.jpg",
            frontImage: "https://beckmans.se/wp-content/uploads/2025/03/Raet-1-1-1061x1500.jpg"
          },
          {
            name: "Lina Blass",
            backImage: "https://beckmans.se/wp-content/uploads/2021/10/Beckmans_Stilleben_skal_agg-1000x1500.jpg",
            frontImage: "https://beckmans.se/wp-content/uploads/2020/10/TO_1-1500x1000.jpg"
          },
          {
            name: "Simon Mattisson",
            backImage: "https://beckmans.se/wp-content/uploads/2021/10/1000_oredi_blC3A5_POST_PS-1024x1024.png.webp",
            frontImage: "https://beckmans.se/wp-content/uploads/2021/10/1000_boi_tvC3A5.png_OOredi_POST_PS-1024x1024.png.webp"
          }
        ]
      },
      mode: {
        program: "MODE 180HP",
        students: [
          {
            name: "Asli Cömert",
            backImage: "https://beckmans.se/wp-content/uploads/2021/01/hqdefault-1.jpg",
            frontImage: "https://beckmans.se/wp-content/uploads/2021/01/BILDNOBEL1_1-1000x1500.jpg"
          },
          {
            name: "Nadja Olsson",
            backImage: "https://beckmans.se/wp-content/uploads/2025/12/VESTIGE2MB.1-1000x1500.jpg",
            frontImage: "https://beckmans.se/wp-content/uploads/2025/12/BECKMANS_2024112588817-1057x1500.jpg"
          },
          {
            name: "Amanda Stuve",
            backImage: "https://beckmans.se/wp-content/uploads/2021/11/envC3A4lde_1-992x1500.jpg",
            frontImage: "https://beckmans.se/wp-content/uploads/2021/11/AmandaStuvePresentation_Page_7af-1494x1500.png"
          },
          {
            name: "Anna Lastro",
            backImage: "https://beckmans.se/wp-content/uploads/2023/05/Anna_007_bild-alvanylander-1200x1500.jpg",
            frontImage: "https://beckmans.se/wp-content/uploads/2023/05/Anna_002_bild-alvanylander-1200x1500.jpg"
          },
          {
            name: "Karolina Pettersson",
            backImage: "https://beckmans.se/wp-content/uploads/2023/05/karolina_pettersson_01_photo_mathias_nordgren-copy-1000x1500.webp",
            frontImage: "https://beckmans.se/wp-content/uploads/2023/05/karolina_pettersson_05_photo_mathias_nordgren-copy-1000x1500.webp"
          }
        ]
      },
      vk: {
        program: "VISUELL KOMMUNIKATION 180HP",
        students: [
          {
            name: "Olle Ljung",
            backImage: "https://beckmans.se/wp-content/uploads/2025/12/491418745_18385417684138754_597021362675519425_n.jpeg",
            frontImage: "https://beckmans.se/wp-content/uploads/2025/12/Chronically-Online-1500x1000.jpg"
          },
          {
            name: "Adam Arinbjarnarson",
            backImage: "https://beckmans.se/wp-content/uploads/2025/05/adam_arinbjarnarson_2025_HR.jpg",
            frontImage: "https://beckmans.se/wp-content/uploads/2024/03/material-1-1071x1500.jpg"
          },
          {
            name: "Rebecca Lagerstedt",
            backImage: "https://beckmans.se/wp-content/uploads/2023/05/hqdefault.jpg",
            frontImage: "https://beckmans.se/wp-content/uploads/2022/03/hqdefault-2.jpg"
          },
          {
            name: "Hanna Hedberg",
            backImage: "https://beckmans.se/wp-content/uploads/2024/12/Screenshot-2024-12-31-at-16.58.47-1105x1500.png",
            frontImage: "https://beckmans.se/wp-content/uploads/2024/10/Screenshot-2024-10-06-at-17.15.53-1121x1500.png"
          },
          {
            name: "Linn Willebrand",
            backImage: "https://beckmans.se/wp-content/uploads/2025/09/Ateljen43.png",
            frontImage: "https://beckmans.se/wp-content/uploads/2024/12/1960753958-ed4d515029d9ac0166846a240547e7a9c7b51c82a7e2468f0330d819979300c5-d_295x166-1.jpg"
          }
        ]
      }
    };

    function shuffledIndices(length) {
      const arr = Array.from({ length }, (_, i) => i);
      for (let i = arr.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function randomDuration() {
      return SLIDE_MS_MIN + Math.random() * (SLIDE_MS_MAX - SLIDE_MS_MIN);
    }

    class CardSlideshow {
      constructor(root, data, options = {}) {
        this.root = root;
        this.data = data;
        this.studentOrder = shuffledIndices(this.data.students.length);
        this.studentOrderPos = 0;
        this.studentIndex = this.studentOrder[this.studentOrderPos];
        this.stepOrder = shuffledIndices(PAGINATION_COUNT);
        this.stepOrderPos = 0;
        this.step = this.stepOrder[this.stepOrderPos];
        this.visibleSlot = "a";
        this.currentSlideDuration = randomDuration();
        const startProgress = options.startProgress ?? Math.random();
        this.cycleStart = performance.now() - startProgress * this.currentSlideDuration;

        this.backA = root.querySelector(".image-layer.back .slot-a");
        this.backB = root.querySelector(".image-layer.back .slot-b");
        this.frontA = root.querySelector(".image-layer.front .slot-a");
        this.frontB = root.querySelector(".image-layer.front .slot-b");
        this.studentEl = root.querySelector(".student");
        this.programEl = root.querySelector(".program");
        this.paginationEl = root.querySelector(".mini-pagination");
        this.fillEl = null;

        this.renderPagination();
        this.applyInitial();
        this.setProgress(startProgress);
      }

      renderPagination() {
        this.paginationEl.innerHTML = "";
        for (let i = 0; i < PAGINATION_COUNT; i += 1) {
          if (i === this.step) {
            const bar = document.createElement("span");
            bar.className = "mini-bar";
            const bg = document.createElement("span");
            bg.className = "mini-bar-bg";
            const fill = document.createElement("span");
            fill.className = "mini-bar-fill";
            bar.append(bg, fill);
            this.paginationEl.appendChild(bar);
            this.fillEl = fill;
          } else {
            const dot = document.createElement("span");
            dot.className = "mini-dot";
            this.paginationEl.appendChild(dot);
          }
        }
      }

      setProgress(progress) {
        if (!this.fillEl) return;
        const clamped = Math.max(0, Math.min(progress, 1));
        this.fillEl.style.transform = `scaleX(${clamped})`;
      }

      applyInitial() {
        const item = this.data.students[this.studentIndex];
        this.backA.src = item.backImage;
        this.frontA.src = item.frontImage;
        this.studentEl.textContent = item.name.toUpperCase();
        this.programEl.textContent = this.data.program;
      }

      nextStudentIndex() {
        this.studentOrderPos += 1;
        if (this.studentOrderPos >= this.studentOrder.length) {
          this.studentOrder = shuffledIndices(this.data.students.length);
          this.studentOrderPos = 0;
        }
        return this.studentOrder[this.studentOrderPos];
      }

      nextPaginationStep() {
        this.stepOrderPos += 1;
        if (this.stepOrderPos >= this.stepOrder.length) {
          this.stepOrder = shuffledIndices(PAGINATION_COUNT);
          this.stepOrderPos = 0;
        }
        return this.stepOrder[this.stepOrderPos];
      }

      nextSlide() {
        this.studentIndex = this.nextStudentIndex();
        const next = this.data.students[this.studentIndex];
        const showA = this.visibleSlot !== "a";
        const nextBack = showA ? this.backA : this.backB;
        const prevBack = showA ? this.backB : this.backA;
        const nextFront = showA ? this.frontA : this.frontB;
        const prevFront = showA ? this.frontB : this.frontA;

        nextBack.src = next.backImage;
        nextFront.src = next.frontImage;
        nextBack.classList.add("is-visible");
        prevBack.classList.remove("is-visible");

        window.setTimeout(() => {
          nextFront.classList.add("is-visible");
          prevFront.classList.remove("is-visible");
          this.studentEl.textContent = next.name.toUpperCase();
        }, FRONT_DELAY_MS);

        this.visibleSlot = showA ? "a" : "b";
        this.step = this.nextPaginationStep();
        this.renderPagination();
        this.cycleStart = performance.now();
        this.currentSlideDuration = randomDuration();
        this.setProgress(0);
      }

      frame(now) {
        const progress = (now - this.cycleStart) / this.currentSlideDuration;
        this.setProgress(progress);
        if (progress >= 1) {
          this.nextSlide();
        }
      }
    }

    const cards = [
      new CardSlideshow(document.querySelector("#col-form"), cardData.form),
      new CardSlideshow(document.querySelector("#col-mode"), cardData.mode),
      new CardSlideshow(document.querySelector("#col-vk"), cardData.vk)
    ];

    function animate(now) {
      cards.forEach((card) => card.frame(now));
      requestAnimationFrame(animate);
    }

    requestAnimationFrame(animate);
  </script>
</body>
</html>
