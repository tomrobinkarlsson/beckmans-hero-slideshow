<!doctype html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beckmans Hero Slideshow</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Geist+Mono:wght@500&display=swap");

    @font-face {
      font-family: "FuturaEFOP-DemiBold";
      src: url("./assets/fonts/FuturaEFOP-DemiBold.otf") format("opentype");
      font-style: normal;
      font-weight: 600;
      font-display: swap;
    }

    :root {
      --bg: #f0f0f0;
      --ink: #231f20;
      --edge: 16px;
      --card-h-max: min(612px, calc(100vh - 188px));
      --card-w-max: calc(var(--card-h-max) * 0.75);
      --card-w: min(var(--card-w-max), calc((100vw - (var(--edge) * 2) - 32px) / 3));
      --card-h: calc(var(--card-w) / 0.75);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "FuturaEFOP-DemiBold", "Avenir Next", "Avenir", "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
    }

    .page {
      width: min(1440px, 100vw);
      margin: 0 auto;
      padding: var(--edge);
      min-height: 100vh;
      position: relative;
      overflow: hidden;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      font-size: 16px;
      letter-spacing: -0.02em;
      text-transform: lowercase;
      line-height: 1;
      user-select: none;
    }

    .nav .brand {
      text-transform: none;
      margin-right: auto;
      letter-spacing: 0;
    }

    .nav .spacer {
      width: 44px;
      flex: 0 0 44px;
    }

    .hero {
      position: absolute;
      left: var(--edge);
      right: var(--edge);
      bottom: var(--edge);
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .hero-col {
      width: var(--card-w);
      min-width: 0;
    }

    .pagination {
      height: 10px;
      display: flex;
      gap: 8px;
      align-items: center;
      margin: 0 0 14px 0;
      padding-left: 1px;
    }

    .dot {
      width: 10px;
      height: 8px;
      border: 1px solid #000;
      border-radius: 999px;
      background: transparent;
      position: relative;
    }

    .dot.active {
      width: 50px;
    }

    .dot .track,
    .dot .fill {
      position: absolute;
      top: 50%;
      left: 3px;
      width: calc(100% - 6px);
      height: 2px;
      translate: 0 -50%;
      border-radius: 999px;
      transform-origin: center center;
      opacity: 0;
    }

    .dot .track {
      background: #000;
      transform: scaleX(0.12);
    }

    .dot .fill {
      background: #000;
      transform: scaleX(0);
      background: #000;
    }

    .dot.active .track,
    .dot.active .fill {
      opacity: 1;
    }

    .card {
      position: relative;
      width: var(--card-w);
      height: var(--card-h);
      border-radius: 4px;
      overflow: hidden;
      background: #dbdbdb;
    }

    .image-layer {
      position: absolute;
      inset: 0;
      overflow: hidden;
      border-radius: 4px;
    }

    .image-layer.front {
      inset: 29px 27px;
      border-radius: 2px;
    }

    .slot {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      opacity: 0;
      transition: opacity 520ms ease;
      will-change: opacity;
    }

    .slot.is-visible {
      opacity: 1;
    }

    .caption {
      position: absolute;
      left: 10px;
      bottom: 10px;
      display: flex;
      flex-direction: column;
      gap: 1px;
      font-family: "Geist Mono", "SFMono-Regular", Menlo, Monaco, Consolas, monospace;
      text-transform: uppercase;
      line-height: 1;
      letter-spacing: 0.08em;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      font-size: 12px;
      color: #fff;
    }

    .caption-line {
      display: inline-flex;
      align-items: center;
      width: max-content;
      min-height: 24px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.98);
      padding: 0 10px;
      white-space: nowrap;
    }

    .caption-line.program::after {
      content: "→";
      margin-left: 8px;
      font-size: 12px;
      line-height: 1;
    }

    @media (max-width: 1100px) {
      .nav span:nth-child(5),
      .nav span:nth-child(6) {
        display: none;
      }
      :root {
        --card-w: min(420px, calc(100vw - (var(--edge) * 2)));
        --card-h: calc(var(--card-w) / 0.75);
      }
      .page {
        overflow-y: auto;
      }
      .hero {
        position: static;
        margin-top: 48px;
        flex-direction: column;
        align-items: center;
        gap: 24px;
        padding-bottom: var(--edge);
      }
      .hero-col {
        width: var(--card-w);
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="nav">
      <span class="brand">beckmans designhögskola</span>
      <span>form</span>
      <span>mode</span>
      <span>visuell kommunikation</span>
      <span>kvällskolan</span>
      <span>ansök</span>
      <span>⌕</span>
      <span class="spacer" aria-hidden="true"></span>
    </header>

    <section class="hero">
      <article class="hero-col" id="col-form">
        <div class="pagination"></div>
        <div class="card">
          <div class="image-layer back">
            <img class="slot slot-a is-visible" alt="">
            <img class="slot slot-b" alt="">
          </div>
          <div class="image-layer front">
            <img class="slot slot-a is-visible" alt="">
            <img class="slot slot-b" alt="">
          </div>
          <div class="caption">
            <span class="caption-line student"></span>
            <span class="caption-line program"></span>
          </div>
        </div>
      </article>

      <article class="hero-col" id="col-mode">
        <div class="pagination"></div>
        <div class="card">
          <div class="image-layer back">
            <img class="slot slot-a is-visible" alt="">
            <img class="slot slot-b" alt="">
          </div>
          <div class="image-layer front">
            <img class="slot slot-a is-visible" alt="">
            <img class="slot slot-b" alt="">
          </div>
          <div class="caption">
            <span class="caption-line student"></span>
            <span class="caption-line program"></span>
          </div>
        </div>
      </article>

      <article class="hero-col" id="col-vk">
        <div class="pagination"></div>
        <div class="card">
          <div class="image-layer back">
            <img class="slot slot-a is-visible" alt="">
            <img class="slot slot-b" alt="">
          </div>
          <div class="image-layer front">
            <img class="slot slot-a is-visible" alt="">
            <img class="slot slot-b" alt="">
          </div>
          <div class="caption">
            <span class="caption-line student"></span>
            <span class="caption-line program"></span>
          </div>
        </div>
      </article>
    </section>
  </main>

  <script>
    const SLIDE_MS = 3800;
    const FRONT_DELAY_MS = 240;
    const PAGINATION_STEPS = 5;

    const cardData = {
      form: {
        program: "FORM 180HP",
        students: [
          {
            name: "Mikael Westman",
            backImage: "https://beckmans.se/wp-content/uploads/2025/10/501A9043-2-Edit-1-1200x1500.jpg",
            frontImage: "https://beckmans.se/wp-content/uploads/2025/02/stool-mikael.westman-02-1500x844.jpg"
          },
          {
            name: "Erik Marklund",
            backImage: "https://beckmans.se/wp-content/uploads/2025/06/Erik-Marklund-Beckmans-Designhogskola-4-1500x1200.jpg",
            frontImage: "https://beckmans.se/wp-content/uploads/2025/02/Pula_Erik_Marklund_Beckmans_2-1200x1500.jpg"
          }
        ]
      },
      mode: {
        program: "MODE 180HP",
        students: [
          {
            name: "Asli Cömert",
            backImage: "https://beckmans.se/wp-content/uploads/2021/01/hqdefault-1.jpg",
            frontImage: "https://beckmans.se/wp-content/uploads/2021/01/BILDNOBEL1_1-1000x1500.jpg"
          },
          {
            name: "Nadja Olsson",
            backImage: "https://beckmans.se/wp-content/uploads/2025/12/VESTIGE2MB.1-1000x1500.jpg",
            frontImage: "https://beckmans.se/wp-content/uploads/2025/12/BECKMANS_2024112588817-1057x1500.jpg"
          }
        ]
      },
      vk: {
        program: "VISUELL KOMMUNIKATION 180HP",
        students: [
          {
            name: "Olle Ljung",
            backImage: "https://beckmans.se/wp-content/uploads/2025/12/491418745_18385417684138754_597021362675519425_n.jpeg",
            frontImage: "https://beckmans.se/wp-content/uploads/2025/12/Chronically-Online-1500x1000.jpg"
          },
          {
            name: "Adam Arinbjarnarson",
            backImage: "https://beckmans.se/wp-content/uploads/2025/05/adam_arinbjarnarson_2025_HR.jpg",
            frontImage: "https://beckmans.se/wp-content/uploads/2024/03/material-1-1071x1500.jpg"
          }
        ]
      }
    };

    class HeroCard {
      constructor(root, data, options = {}) {
        this.root = root;
        this.data = data;
        this.index = 0;
        this.slotName = "a";
        this.tick = options.startStep ?? 0;
        this.startProgress = options.startProgress ?? 0;
        this.lastNow = performance.now();
        this.cycleStart = this.lastNow - this.startProgress * SLIDE_MS;

        this.backA = root.querySelector(".image-layer.back .slot-a");
        this.backB = root.querySelector(".image-layer.back .slot-b");
        this.frontA = root.querySelector(".image-layer.front .slot-a");
        this.frontB = root.querySelector(".image-layer.front .slot-b");
        this.studentEl = root.querySelector(".student");
        this.programEl = root.querySelector(".program");

        this.paginationRoot = root.querySelector(".pagination");
        this.progressFill = null;
        this.currentStep = 0;
        this.setupPagination();
        this.applyInitial();
        this.setProgress(this.startProgress);
      }

      setupPagination() {
        this.paginationRoot.innerHTML = "";
        this.dots = [];
        for (let i = 0; i < PAGINATION_STEPS; i += 1) {
          const dot = document.createElement("span");
          dot.className = "dot";
          const track = document.createElement("span");
          track.className = "track";
          const fill = document.createElement("span");
          fill.className = "fill";
          dot.appendChild(track);
          dot.appendChild(fill);
          this.paginationRoot.appendChild(dot);
          this.dots.push(dot);
        }
        this.activateStep(this.tick % PAGINATION_STEPS);
      }

      activateStep(step) {
        this.currentStep = step % PAGINATION_STEPS;
        this.dots.forEach((dot, i) => {
          dot.classList.toggle("active", i === this.currentStep);
          const fill = dot.querySelector(".fill");
          fill.style.transform = "scaleX(0)";
        });
        this.progressFill = this.dots[this.currentStep].querySelector(".fill");
      }

      setProgress(progress) {
        if (!this.progressFill) return;
        this.progressFill.style.transform = `scaleX(${Math.max(0, Math.min(progress, 1))})`;
      }

      applyInitial() {
        const first = this.data.students[this.index];
        this.backA.src = first.backImage;
        this.frontA.src = first.frontImage;
        this.backA.alt = `${first.name} ${this.data.program.toLowerCase()} bakgrund`;
        this.frontA.alt = `${first.name} ${this.data.program.toLowerCase()} förgrund`;
        this.studentEl.textContent = first.name.toUpperCase();
        this.programEl.textContent = this.data.program;
      }

      next() {
        this.index = (this.index + 1) % this.data.students.length;
        const nextData = this.data.students[this.index];
        const showA = this.slotName !== "a";
        const nextBack = showA ? this.backA : this.backB;
        const nextFront = showA ? this.frontA : this.frontB;
        const prevBack = showA ? this.backB : this.backA;
        const prevFront = showA ? this.frontB : this.frontA;

        nextBack.src = nextData.backImage;
        nextBack.alt = `${nextData.name} ${this.data.program.toLowerCase()} bakgrund`;
        nextFront.src = nextData.frontImage;
        nextFront.alt = `${nextData.name} ${this.data.program.toLowerCase()} förgrund`;

        nextBack.classList.add("is-visible");
        prevBack.classList.remove("is-visible");

        window.setTimeout(() => {
          nextFront.classList.add("is-visible");
          prevFront.classList.remove("is-visible");
          this.studentEl.textContent = nextData.name.toUpperCase();
          this.programEl.textContent = this.data.program;
        }, FRONT_DELAY_MS);

        this.slotName = showA ? "a" : "b";
        this.tick += 1;
        this.activateStep(this.tick % PAGINATION_STEPS);
        this.cycleStart = performance.now();
        this.setProgress(0);
      }

      frame(now) {
        const elapsed = now - this.cycleStart;
        const progress = elapsed / SLIDE_MS;
        this.setProgress(progress);
        if (elapsed >= SLIDE_MS) {
          this.next();
        }
      }
    }

    const cards = [
      new HeroCard(document.querySelector("#col-form"), cardData.form, { startStep: 0, startProgress: 0.41 }),
      new HeroCard(document.querySelector("#col-mode"), cardData.mode, { startStep: 3, startProgress: 0.58 }),
      new HeroCard(document.querySelector("#col-vk"), cardData.vk, { startStep: 4, startProgress: 0.24 })
    ];

    function animate(now) {
      cards.forEach((card) => card.frame(now));
      requestAnimationFrame(animate);
    }

    requestAnimationFrame(animate);
  </script>
</body>
</html>
